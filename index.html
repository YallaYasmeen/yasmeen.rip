<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <link rel="icon" href="favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="style.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500&family=Raleway:wght@200&display=swap"
      rel="stylesheet"
    />
    <title>Yasmeens Links</title>
    <script
      src="https://kit.fontawesome.com/6f8a577184.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <main id="main">
      <div class="overlay"></div>
      <section class="content">
        <div class="pfp-container">
          <img src="vtuber.gif" alt="Yasmeen as cartoon" />
        </div>
        <div class="content-container">
          <h1 class="branding">
            <img src="yalla yas.png" alt="yasmeen abbass Logo" />
          </h1>
          <h2>ياسمين عباس</h2>
          <h2>activism and artistry</h2>
          <div class="links">
            <a
              href="mailto:yallayasmeen@proton.me"
              target="_blank"
              aria-label="email"
            >
              <i class="fa-solid fa-envelope"></i>
            </a>
            <a
              href="https://www.instagram.com/yallayasmeen/"
              target="_blank"
              aria-label="instagram"
            >
              <i class="fa-brands fa-instagram"></i>
            </a>
            <a
              href="https://twitter.com/yallayasmeen"
              target="_blank"
              aria-label="twitter"
            >
              <i class="fa-brands fa-twitter"></i>
            </a>
            <a
              href="https://twitch.tv/yallayasmeen"
              target="_blank"
              aria-label="twitch"
            >
              <i class="fab fa-twitch"></i>
            </a>
            <a
              href="https://bsky.app/profile/yasmeen.bsky.social"
              target="_blank"
              aria-label="BlueSky"
            >
              <i class="fa-brands fa-bluesky"></i>
            </a>
          </div>
          <ul class="socials" role="list">
            <li>
              <a
                class="button"
                href="https://gogetfunding.com/lift-lebanon-emergency-relief"
                target="_blank"
                >Lebanon Emergency Relief</a
              >
            </li>
            <li>
              <a
                class="button"
                href="https://bio.link/watermelons"
                target="_blank"
                >Help Palestinian families</a
              >
            </li>
            <li>
              <a
                class="button"
                href="https://substack.com/@yallayasmeen"
                target="_self"
                >Substack</a
              >
            </li>
            <li>
              <a class="button" href="afilliate links.html" target="_self"
                >Affiliate links</a
              >
            </li>
            <li>
              <script src="https://storage.ko-fi.com/cdn/scripts/overlay-widget.js"></script>
              <script>
                kofiWidgetOverlay.draw("yasmeen", {
                  type: "floating-chat",
                  "floating-chat.donateButton.text": "Support me",
                  "floating-chat.donateButton.background-color": "#ff0100",
                  "floating-chat.donateButton.text-color": "#fff",
                });
              </script>
            </li>
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
